<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Second Brain — Graph</title>
<style>
  html, body { margin: 0; height: 100%; background: #0f1117; color: #e6e6e6;
               font: 13px/1.4 -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  #hud { position: fixed; top: 12px; left: 14px; z-index: 2; pointer-events: none; }
  #hud h1 { font-size: 15px; margin: 0 0 4px; }
  #hud .sub { color: #9aa0ae; font-size: 12px; }
  #legend { position: fixed; bottom: 12px; left: 14px; z-index: 2; color: #9aa0ae; }
  #legend span { display: inline-flex; align-items: center; margin-right: 12px; }
  #legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  #tip { position: fixed; z-index: 3; background: #1c2030; border: 1px solid #343b52;
         border-radius: 6px; padding: 8px 10px; display: none; max-width: 340px; }
  #tip b { display: block; margin-bottom: 2px; }
  #tip .path { color: #8ab4f8; word-break: break-all; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="hud">
  <h1>🧠 Second Brain</h1>
  <div class="sub" id="stats"></div>
  <div class="sub">drag nodes · scroll to zoom · drag background to pan</div>
</div>
<div id="legend"></div>
<div id="tip"></div>
<canvas id="c"></canvas>
<script>
const DATA = /*__SBK_DATA__*/ {"nodes":[],"links":[]};

// ---- resolve relative markdown links to vault-relative paths ----
function resolveHref(dir, href) {
  href = href.replace(/[#?].*$/, "");
  if (!href) return null;
  const parts = (dir ? dir.split("/") : []).filter(Boolean);
  for (const seg of href.split("/")) {
    if (seg === "." || seg === "") continue;
    else if (seg === "..") parts.pop();
    else parts.push(seg);
  }
  return parts.join("/");
}

const byPath = new Map(DATA.nodes.map(n => [n.path, n]));
const links = [];
for (const l of DATA.links) {
  const t = resolveHref(l.dir, l.href);
  if (t && byPath.has(l.source) && byPath.has(t) && l.source !== t)
    links.push({ s: byPath.get(l.source), t: byPath.get(t) });
}
const nodes = DATA.nodes;

// ---- type colors ----
const PALETTE = ["#8ab4f8","#f28b82","#fdd663","#81c995","#c58af9","#78d9ec","#ffa96b","#ff8bcb"];
const types = [...new Set(nodes.map(n => n.type || "note"))];
const colorOf = t => PALETTE[types.indexOf(t) % PALETTE.length];
document.getElementById("legend").innerHTML =
  types.map(t => `<span><i style="background:${colorOf(t)}"></i>${t}</span>`).join("");
document.getElementById("stats").textContent =
  `${nodes.length} notes · ${links.length} links`;

// ---- degree-based sizing ----
const deg = new Map();
links.forEach(l => { deg.set(l.s.path,(deg.get(l.s.path)||0)+1);
                     deg.set(l.t.path,(deg.get(l.t.path)||0)+1); });
nodes.forEach(n => { n.r = 6 + Math.min(10, (deg.get(n.path)||0) * 1.5); });

// ---- simulation ----
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let W, H; function size(){ W=cv.width=innerWidth*devicePixelRatio;
  H=cv.height=innerHeight*devicePixelRatio;
  cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; }
size(); addEventListener("resize", size);

nodes.forEach((n,i) => { const a=i/nodes.length*Math.PI*2, r=120+40*(i%5);
  n.x=Math.cos(a)*r; n.y=Math.sin(a)*r; n.vx=0; n.vy=0; });

let view = { x: 0, y: 0, k: 1 };
function tick() {
  for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
    const a=nodes[i], b=nodes[j];
    let dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy || 1;
    if (d2 < 90000) { const f=1400/d2, d=Math.sqrt(d2);
      dx/=d; dy/=d; a.vx-=dx*f; a.vy-=dy*f; b.vx+=dx*f; b.vy+=dy*f; }
  }
  for (const l of links) {
    let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-90)*0.01;
    dx/=d; dy/=d;
    l.s.vx+=dx*f*d*0.02; l.s.vy+=dy*f*d*0.02;
    l.t.vx-=dx*f*d*0.02; l.t.vy-=dy*f*d*0.02;
  }
  for (const n of nodes) {
    n.vx -= n.x*0.003; n.vy -= n.y*0.003;
    if (n !== dragging) { n.x += n.vx*=0.85; n.y += n.vy*=0.85; }
  }
}

function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.translate(innerWidth/2+view.x, innerHeight/2+view.y);
  ctx.scale(view.k, view.k);
  ctx.strokeStyle = "rgba(140,150,180,0.25)"; ctx.lineWidth = 1;
  for (const l of links) { ctx.beginPath(); ctx.moveTo(l.s.x,l.s.y); ctx.lineTo(l.t.x,l.t.y); ctx.stroke(); }
  for (const n of nodes) {
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,7);
    ctx.fillStyle = colorOf(n.type||"note"); ctx.fill();
    if (view.k > 0.6) { ctx.fillStyle="#c9cedb";
      ctx.fillText(n.title.slice(0,28), n.x+n.r+4, n.y+4); }
  }
}
(function loop(){ tick(); draw(); requestAnimationFrame(loop); })();

// ---- interaction ----
let dragging = null, panning = false, px = 0, py = 0;
const toWorld = (mx,my) => ({ x:(mx-innerWidth/2-view.x)/view.k, y:(my-innerHeight/2-view.y)/view.k });
const hit = (mx,my) => { const p=toWorld(mx,my);
  return nodes.find(n => (n.x-p.x)**2+(n.y-p.y)**2 < (n.r+3)**2); };
const tip = document.getElementById("tip");

cv.addEventListener("mousedown", e => {
  const n = hit(e.clientX,e.clientY);
  if (n) dragging = n; else { panning = true; px = e.clientX; py = e.clientY; }
});
addEventListener("mousemove", e => {
  if (dragging) { const p=toWorld(e.clientX,e.clientY); dragging.x=p.x; dragging.y=p.y; }
  else if (panning) { view.x+=e.clientX-px; view.y+=e.clientY-py; px=e.clientX; py=e.clientY; }
  else { const n = hit(e.clientX,e.clientY);
    if (n) { tip.style.display="block";
      tip.style.left=Math.min(e.clientX+14, innerWidth-350)+"px";
      tip.style.top=(e.clientY+14)+"px";
      tip.innerHTML=`<b>${n.title}</b><span class="path">${n.path}</span>` +
        (n.description?`<div>${n.description}</div>`:"") +
        `<div style="color:#9aa0ae">type: ${n.type||"note"}</div>`;
    } else tip.style.display="none"; }
});
addEventListener("mouseup", () => { dragging = null; panning = false; });
cv.addEventListener("wheel", e => { e.preventDefault();
  view.k = Math.max(0.2, Math.min(4, view.k * (e.deltaY < 0 ? 1.1 : 0.9))); }, { passive:false });
</script>
</body>
</html>
