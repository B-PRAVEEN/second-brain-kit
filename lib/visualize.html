<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Second Brain — Graph</title>
<style>
  html, body { margin: 0; height: 100%; background: #0f1117; color: #e6e6e6;
               font: 13px/1.4 -apple-system, "Segoe UI", sans-serif; overflow: hidden; }
  #hud { position: fixed; top: 12px; left: 14px; z-index: 2; pointer-events: none; }
  #hud h1 { font-size: 15px; margin: 0 0 4px; }
  #hud .sub { color: #9aa0ae; font-size: 12px; }
  #legend { position: fixed; bottom: 12px; left: 14px; z-index: 2; color: #9aa0ae; }
  #legend span { display: inline-flex; align-items: center; margin-right: 12px; }
  #legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  #tip { position: fixed; z-index: 3; background: #1c2030; border: 1px solid #343b52;
         border-radius: 6px; padding: 8px 10px; display: none; max-width: 340px; }
  #tip b { display: block; margin-bottom: 2px; }
  #tip .path { color: #8ab4f8; word-break: break-all; }
  canvas { display: block; }
  #sbtab { position: fixed; top: 12px; right: 12px; z-index: 5; background: #1c2030;
           border: 1px solid #343b52; border-radius: 6px; color: #c9cedb;
           padding: 4px 9px; cursor: pointer; user-select: none; }
  #sidebar { position: fixed; top: 0; right: 0; bottom: 0; width: 280px; z-index: 4;
             background: #151823; border-left: 1px solid #2a3044; overflow-y: auto;
             padding: 14px; padding-top: 44px; box-sizing: border-box;
             transition: transform .2s; }
  #sidebar.collapsed { transform: translateX(100%); }
  #sidebar h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em;
                color: #9aa0ae; margin: 18px 0 6px; }
  #search { width: 100%; box-sizing: border-box; background: #0f1117; color: #e6e6e6;
            border: 1px solid #343b52; border-radius: 6px; padding: 6px 8px; font: inherit; }
  #search:focus { outline: none; border-color: #8ab4f8; }
  #matches { color: #9aa0ae; font-size: 12px; margin-top: 4px; min-height: 15px; }
  .mstat { color: #c9cedb; font-size: 12px; margin: 3px 0; }
  .mstat b { color: #e6e6e6; }
  .sess { padding: 6px 8px; margin: 0 -8px; border-radius: 6px; cursor: pointer; }
  .sess:hover { background: #1c2030; }
  .sess .t { display: block; }
  .sess .m { color: #9aa0ae; font-size: 11px; }
  .empty { color: #9aa0ae; font-size: 12px; }
</style>
</head>
<body>
<div id="hud">
  <h1>🧠 Second Brain</h1>
  <div class="sub" id="stats"></div>
  <div class="sub">drag nodes · scroll to zoom · drag background to pan</div>
</div>
<div id="legend"></div>
<div id="tip"></div>
<div id="sbtab" title="toggle sidebar">☰</div>
<div id="sidebar" class="collapsed">
  <input id="search" placeholder="Search notes…">
  <div id="matches"></div>
  <h2>Vault</h2>
  <div id="meta" class="empty">no vault metadata (regenerate with a newer sbk)</div>
  <h2>Recent sessions</h2>
  <div id="sess"><div class="empty">none yet</div></div>
</div>
<canvas id="c"></canvas>
<script>
const DATA = /*__SBK_DATA__*/ {"nodes":[],"links":[]};
const META = DATA.meta || null;          // absent in payloads from older sbk
const SESSIONS = DATA.sessions || [];

// ---- resolve relative markdown links to vault-relative paths ----
function resolveHref(dir, href) {
  href = href.replace(/[#?].*$/, "");
  if (!href) return null;
  const parts = (dir ? dir.split("/") : []).filter(Boolean);
  for (const seg of href.split("/")) {
    if (seg === "." || seg === "") continue;
    else if (seg === "..") parts.pop();
    else parts.push(seg);
  }
  return parts.join("/");
}

const byPath = new Map(DATA.nodes.map(n => [n.path, n]));
const links = [];
for (const l of DATA.links) {
  const t = resolveHref(l.dir, l.href);
  if (t && byPath.has(l.source) && byPath.has(t) && l.source !== t)
    links.push({ s: byPath.get(l.source), t: byPath.get(t) });
}
const nodes = DATA.nodes;

// ---- type colors ----
const PALETTE = ["#8ab4f8","#f28b82","#fdd663","#81c995","#c58af9","#78d9ec","#ffa96b","#ff8bcb"];
const types = [...new Set(nodes.map(n => n.type || "note"))];
const colorOf = t => PALETTE[types.indexOf(t) % PALETTE.length];
document.getElementById("legend").innerHTML =
  types.map(t => `<span><i style="background:${colorOf(t)}"></i>${t}</span>`).join("");
document.getElementById("stats").textContent =
  `${nodes.length} notes · ${links.length} links`;

// ---- degree-based sizing ----
const deg = new Map();
links.forEach(l => { deg.set(l.s.path,(deg.get(l.s.path)||0)+1);
                     deg.set(l.t.path,(deg.get(l.t.path)||0)+1); });
nodes.forEach(n => { n.r = 6 + Math.min(10, (deg.get(n.path)||0) * 1.5); });

// ---- simulation ----
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let W, H; function size(){ W=cv.width=innerWidth*devicePixelRatio;
  H=cv.height=innerHeight*devicePixelRatio;
  cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; }
size(); addEventListener("resize", size);

nodes.forEach((n,i) => { const a=i/nodes.length*Math.PI*2, r=120+40*(i%5);
  n.x=Math.cos(a)*r; n.y=Math.sin(a)*r; n.vx=0; n.vy=0; });

let view = { x: 0, y: 0, k: 1 };
function tick() {
  for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++) {
    const a=nodes[i], b=nodes[j];
    let dx=b.x-a.x, dy=b.y-a.y, d2=dx*dx+dy*dy || 1;
    if (d2 < 90000) { const f=1400/d2, d=Math.sqrt(d2);
      dx/=d; dy/=d; a.vx-=dx*f; a.vy-=dy*f; b.vx+=dx*f; b.vy+=dy*f; }
  }
  for (const l of links) {
    let dx=l.t.x-l.s.x, dy=l.t.y-l.s.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1, f=(d-90)*0.01;
    dx/=d; dy/=d;
    l.s.vx+=dx*f*d*0.02; l.s.vy+=dy*f*d*0.02;
    l.t.vx-=dx*f*d*0.02; l.t.vy-=dy*f*d*0.02;
  }
  for (const n of nodes) {
    n.vx -= n.x*0.003; n.vy -= n.y*0.003;
    if (n !== dragging) { n.x += n.vx*=0.85; n.y += n.vy*=0.85; }
  }
}

function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,W,H);
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.translate(innerWidth/2+view.x, innerHeight/2+view.y);
  ctx.scale(view.k, view.k);
  ctx.strokeStyle = "rgba(140,150,180,0.25)"; ctx.lineWidth = 1;
  for (const l of links) {
    ctx.globalAlpha = (l.s.dim || l.t.dim) ? 0.08 : 1;
    ctx.beginPath(); ctx.moveTo(l.s.x,l.s.y); ctx.lineTo(l.t.x,l.t.y); ctx.stroke();
  }
  for (const n of nodes) {
    ctx.globalAlpha = n.dim ? 0.12 : 1;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,7);
    ctx.fillStyle = colorOf(n.type||"note"); ctx.fill();
    if (view.k > 0.6 && !n.dim) { ctx.fillStyle="#c9cedb";
      ctx.fillText(n.title.slice(0,28), n.x+n.r+4, n.y+4); }
  }
  ctx.globalAlpha = 1;
}
(function loop(){ tick(); draw(); requestAnimationFrame(loop); })();

// ---- interaction ----
let dragging = null, panning = false, px = 0, py = 0;
const toWorld = (mx,my) => ({ x:(mx-innerWidth/2-view.x)/view.k, y:(my-innerHeight/2-view.y)/view.k });
const hit = (mx,my) => { const p=toWorld(mx,my);
  return nodes.find(n => (n.x-p.x)**2+(n.y-p.y)**2 < (n.r+3)**2); };
const tip = document.getElementById("tip");

cv.addEventListener("mousedown", e => {
  const n = hit(e.clientX,e.clientY);
  if (n) dragging = n; else { panning = true; px = e.clientX; py = e.clientY; }
});
addEventListener("mousemove", e => {
  if (dragging) { const p=toWorld(e.clientX,e.clientY); dragging.x=p.x; dragging.y=p.y; }
  else if (panning) { view.x+=e.clientX-px; view.y+=e.clientY-py; px=e.clientX; py=e.clientY; }
  else { const n = hit(e.clientX,e.clientY);
    if (n) { tip.style.display="block";
      tip.style.left=Math.min(e.clientX+14, innerWidth-350)+"px";
      tip.style.top=(e.clientY+14)+"px";
      tip.innerHTML=`<b>${n.title}</b><span class="path">${n.path}</span>` +
        (n.description?`<div>${n.description}</div>`:"") +
        `<div style="color:#9aa0ae">type: ${n.type||"note"}</div>`;
    } else tip.style.display="none"; }
});
addEventListener("mouseup", () => { dragging = null; panning = false; });
cv.addEventListener("wheel", e => { e.preventDefault();
  view.k = Math.max(0.2, Math.min(4, view.k * (e.deltaY < 0 ? 1.1 : 0.9))); }, { passive:false });

// ---- sidebar: vault meta, recent sessions, search ----
const esc = s => String(s ?? "").replace(/[&<>"]/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
const sidebar = document.getElementById("sidebar");
document.getElementById("sbtab").onclick = () => sidebar.classList.toggle("collapsed");

if (META) {
  sidebar.classList.remove("collapsed");
  const g = META.git || {};
  const gitLine = !g.enabled ? "git backup off"
    : (g.dirty ? `● ${g.dirty} uncommitted` : "✓ clean")
      + (g.lastAutocommit ? ` · autocommit ${esc(g.lastAutocommit)}` : "");
  const meta = document.getElementById("meta");
  meta.className = "";
  meta.innerHTML =
    `<div class="mstat"><b>${esc(META.vault)}</b></div>` +
    `<div class="mstat">${META.noteCount ?? nodes.length} notes · ${META.sessionCount ?? 0} session logs</div>` +
    `<div class="mstat">${gitLine}</div>` +
    `<div class="mstat">kit v${esc(META.kitVersion)} · ${esc(META.generated)}</div>`;
}

if (SESSIONS.length) {
  document.getElementById("sess").innerHTML = SESSIONS.map(s =>
    `<div class="sess" title="${esc(s.path)}"><span class="t">${esc(s.title)}</span>` +
    `<span class="m">${esc(s.client)}${s.timestamp ? " · " + esc(s.timestamp) : ""}</span></div>`).join("");
  if (META && META.vaultPath) {
    // best-effort: browsers differ in how they open file:// markdown links
    document.querySelectorAll("#sess .sess").forEach((el, i) => {
      el.onclick = () => { location.href = "file://" + encodeURI(META.vaultPath + "/" + SESSIONS[i].path); };
    });
  }
}

const searchBox = document.getElementById("search");
const matchesEl = document.getElementById("matches");
searchBox.addEventListener("input", () => {
  const q = searchBox.value.trim().toLowerCase();
  let m = 0;
  for (const n of nodes) {
    n.dim = !!q && !`${n.title} ${n.path} ${n.type||""}`.toLowerCase().includes(q);
    if (q && !n.dim) m++;
  }
  matchesEl.textContent = q ? `${m} match${m === 1 ? "" : "es"}` : "";
});
</script>
</body>
</html>
