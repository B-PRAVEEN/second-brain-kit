name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -x -S warning install.sh lib/*.sh lib/adapters/*.sh bin/sbk

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install (vault only)
        run: |
          ./install.sh -y --vault "$RUNNER_TEMP/vault" --no-clients
      - name: vault structure
        run: |
          test -f "$RUNNER_TEMP/vault/index.md"
          test -f "$RUNNER_TEMP/vault/AGENTS.md"
          test -d "$RUNNER_TEMP/vault/Sessions/Claude"
          ! grep -r '{{' "$RUNNER_TEMP/vault" --include='*.md'
      - name: sbk doctor + visualize
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          sbk doctor
          sbk visualize --no-open
          test -s "$RUNNER_TEMP/vault/.sbk-graph.html"
      - name: capture + dashboard data
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          sbk capture "hello from CI"
          test -f "$RUNNER_TEMP/vault/Inbox/index.md"
          ls "$RUNNER_TEMP/vault/Inbox" | grep -q 'captures'
          sbk visualize --no-open
          grep -q '"meta"' "$RUNNER_TEMP/vault/.sbk-graph.html"
          grep -q '"sessions"' "$RUNNER_TEMP/vault/.sbk-graph.html"
          ! grep -r '{{' "$RUNNER_TEMP/vault" --include='*.md'
